name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main # Change this if your default branch is different (e.g., master)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Vite builds your compiled static HTML, CSS, & JS into
          branch: gh-pages # The branch the action deploys static files to
